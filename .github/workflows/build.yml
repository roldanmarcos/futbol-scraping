name: Build

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: futbol_scraping
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d futbol_scraping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: futbol_scraping
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: ./mvnw -B -ntp -t .github/maven-toolchains.xml clean verify

      - name: Validate SonarCloud Settings
        id: sonar_precheck
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        shell: bash
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud skipped: missing SONAR_TOKEN secret or SONAR_ORGANIZATION, SONAR_PROJECT_KEY variables."
          else
            echo "sonar_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Analysis
        if: steps.sonar_precheck.outputs.sonar_enabled == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_HOST_URL: https://sonarcloud.io
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: futbol_scraping
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: >-
          ./mvnw -B -ntp -t .github/maven-toolchains.xml
          verify org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar
          -DskipTests
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.organization=${SONAR_ORGANIZATION}
