spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.futbol.scraping.web

whoscored:
  base-url: https://www.whoscored.com
  number-of-players: 2757
  selenium:
    headless: true
    wait-seconds: 20

app:
  jwt:
    secret: ${JWT_SECRET:MiClaveSuperSecretaParaDesarrollo12345678901234567890}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  superuser:
    username: superuser
    email: superuser@futbol.com
    password: ${SUPERUSER_PASSWORD}
    initial-balance: 1000000
  tokens-per-player: 100
  initial-token-price: 1.00
  quote:
    base-value: 100.0
    scale-factor: 500.0
  scheduling:
    enabled: true
    cron: "0 0 0 * * MON"