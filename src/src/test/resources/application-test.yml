# ===================================================================
# Perfil "test" — activado con @ActiveProfiles("test") / @FutbolIT.
# La base de datos se resuelve con Testcontainers + PostgreSQL para evitar H2.
# ===================================================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/futbol_scraping
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  cache:
    type: none

app:
  data-initializer:
    enabled: false      # evita que DataInitializer invoque Selenium al arrancar el contexto de test
  scheduling:
    enabled: false
  jwt:
    secret: test-secret-key-minimum-256-bits-for-testing-purposes-only
    expiration-ms: 3600000
  superuser:
    password: test-superuser-password
